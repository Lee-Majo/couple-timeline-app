<!DOCTYPE html>
<html>
<head>
  <title>Couple Timeline</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="header">
  <h1>💕 Our Timeline</h1>

  <div class="header-right">
    <div id="counter" class="counter"></div>
    <button onclick="logout()" class="logout-btn">Logout</button>
  </div>
</div>

<h2 id="counter"></h2>

<input id="title" placeholder="Memory title">

<input id="date" type="date">

<input type="file" id="image">

<img id="preview" style="max-width:200px; display:none; margin-top:10px;">

<textarea id="description" placeholder="Describe the memory"></textarea>

<br><br>

<button onclick="addMemory()">Add Memory</button>

<h2>Memories</h2>

<div id="timeline" class="timeline"></div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="script.js"></script>

</body>
</html>
